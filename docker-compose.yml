services:
  mysql:
    image: mysql:8.4
    container_name: lau-tam-gioi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lautamgioi_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  web:
    build: .
    container_name: lau-tam-gioi-web
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/lautamgioi_db?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Ho_Chi_Minh
      DB_USER: root
      DB_PASSWORD: 123456
    ports:
      - "8080:8080"

volumes:
  mysql-data:
